# https://github.com/prettier/prettier
name: "Prettier"
on:
  - push
  - pull_request
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .devcontainer/dependencies/package-lock.json

      - name: Install dependencies
        run: npm install --prefix .devcontainer/dependencies --no-audit --no-fund

      - name: Formatting check
        run: npx --prefix .devcontainer/dependencies prettier --check '**.md'
